repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.7
    hooks:
      - id: ruff
        args: [--fix, --exit-zero]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - sqlalchemy
          - fastapi
          - pydantic
          - pydantic-settings
        args: [--strict]

  # Bandit — SAST for Python security issues (OWASP Top 10)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ["-r", "app/", "-ll", "--skip", "B101"]
        # -ll = medium+ severity (reject HIGH/CRITICAL)
        # --skip B101 = skip assert_used (OK in our code)

  # Semgrep — semantic security analysis
  - repo: https://github.com/returntocorp/semgrep
    rev: v1.45.0
    hooks:
      - id: semgrep
        args: ["--config=p/security-audit", "--config=p/owasp-top-ten", "--error"]
        files: ^app/
        stages: [commit]

  # Detect secrets — prevent API key/credential commits
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: local
    hooks:
      - id: alembic-autogenerate
        name: Alembic autogenerate check
        entry: bash -c 'alembic current || true'
        language: system
        always_run: false
        stages: [commit]
