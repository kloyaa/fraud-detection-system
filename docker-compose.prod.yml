# Docker Compose - Production Environment
# Minimal, hardened configuration for production deployment

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ras_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:-ras_prod}
      # Production security settings
      POSTGRES_INITDB_ARGS: >
        -c shared_preload_libraries=pg_stat_statements
        -c log_statement=all
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/server.crt
        -c ssl_key_file=/var/lib/postgresql/server.key
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./certs/server.crt:/var/lib/postgresql/server.crt:ro
      - ./certs/server.key:/var/lib/postgresql/server.key:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - ras_net
    # No port exposure in production behind ALB/ELB

  redis:
    image: redis:7-alpine
    container_name: ras_redis_prod
    command: redis-server --requirepass ${REDIS_PASSWORD:?error} --loglevel warning
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    volumes:
      - redis_data_prod:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - ras_net
    # No port exposure in production

  app:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - ras:latest
    image: ras:latest
    container_name: ras_app_prod
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ras_prod}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
      LOG_LEVEL: INFO
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "20"
        labels: "service=ras-api"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ras_net
    # Port exposed to local container network only
    expose:
      - "8000"
    # Readiness probe for orchestrators
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  ras_net:
    driver: bridge
    driver_opts:
      # Limit network traffic to this network only
      "com.docker.network.driver.mtu": "1500"
