# Docker Compose - Development Environment
# Full local stack: PostgreSQL 16, Redis 7, Kafka 7.6.1/cp-kafka (KRaft), Cassandra 5,
# HashiCorp Vault 1.17, Keycloak 25, FastAPI app, Next.js frontend.
#
# Per ADR-007: In production, service-to-service communication is protected
# by Istio mTLS. Locally we use a shared bridge network without mTLS.
#
# Usage:
#   make dev          → Start all services (detached)
#   make docker-down  → Stop all services
#   make docker-logs  → Follow app logs

services:
  # ─── Data Layer ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ras_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ras_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ras_net

  redis:
    image: redis:7-alpine
    container_name: ras_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ras_net

  cassandra:
    image: cassandra:5
    container_name: ras_cassandra_dev
    environment:
      CASSANDRA_CLUSTER_NAME: ras_local
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: SimpleSnitch
      # Reduced heap for local dev (default 8G is too large for laptops)
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "128M"
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - ras_net

  pgbouncer:
    # PgBouncer — transaction-mode connection pooler in front of PostgreSQL.
    # App connects to pgbouncer:6432 instead of postgres:5432 in staging/prod.
    # Locally available for testing; docker-compose app service still uses postgres:5432 directly.
    image: edoburu/pgbouncer:latest
    container_name: ras_pgbouncer_dev
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ras_dev
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      SERVER_RESET_QUERY: DISCARD ALL
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ras_net

  # ─── Event Streaming ───────────────────────────────────────────────────────

  kafka:
    # confluent cp-kafka: free on Docker Hub, KRaft mode (no Zookeeper),
    # compatible with Confluent Cloud (staging/prod per sprint spec).
    image: confluentinc/cp-kafka:7.6.1
    container_name: ras_kafka_dev
    environment:
      # KRaft mode — no Zookeeper required
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Stable cluster ID — required for KRaft; keep consistent across restarts
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092" # Internal (container-to-container)
      - "9094:9094" # External (host access for tests outside Docker)
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - ras_net

  # ─── Secrets & Identity ────────────────────────────────────────────────────

  vault:
    image: hashicorp/vault:1.17
    container_name: ras_vault_dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      # Disable TLS in dev mode (production uses TLS + mTLS via ADR-007)
      VAULT_LOG_LEVEL: warn
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    networks:
      - ras_net

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: ras_keycloak_dev
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: warn
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks:
      - ras_net

  # ─── Application Layer ─────────────────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ras_app_dev
    environment:
      ENVIRONMENT: development
      DEBUG: "True"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ras_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: ras_dev
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ras
      KEYCLOAK_CLIENT_ID: ras-backend
      KEYCLOAK_CLIENT_SECRET: dev-secret-change-in-production
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      vault:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - ras_net
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_ENV: development
    container_name: ras_frontend_dev
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production-openssl-rand-base64-32
      NEXT_PUBLIC_APP_ENV: development
      BACKEND_URL: http://app:8000
      KEYCLOAK_CLIENT_ID: ras-frontend
      KEYCLOAK_CLIENT_SECRET: dev-secret-change-in-production
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/ras
    ports:
      - "3000:3000"
    depends_on:
      - app
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - ras_net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  cassandra_data:
  kafka_data:
  keycloak_data:

networks:
  ras_net:
    driver: bridge
