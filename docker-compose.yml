# Docker Compose - Development Environment
# PostgreSQL 16, Redis 7, FastAPI app

services:
  postgres:
    image: postgres:16-alpine
    container_name: ras_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ras_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ras_net

  redis:
    image: redis:7-alpine
    container_name: ras_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ras_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ras_app_dev
    environment:
      ENVIRONMENT: development
      DEBUG: "True"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ras_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app # Mount source for reload on changes
    networks:
      - ras_net
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_ENV: development
    container_name: ras_frontend_dev
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production-openssl-rand-base64-32
      NEXT_PUBLIC_APP_ENV: development
      BACKEND_URL: http://app:8000
    ports:
      - "3000:3000"
    depends_on:
      - app
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - ras_net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    command: pnpm dev

volumes:
  postgres_data:
  redis_data:

networks:
  ras_net:
    driver: bridge
