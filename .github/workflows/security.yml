name: Security Scanning

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: bandit -r app/ -ll --skip B101 --format json --output bandit-report.json
        continue-on-error: true

      - name: Check for HIGH/CRITICAL findings
        run: |
          python3 << 'EOF'
          import json
          with open("bandit-report.json") as f:
              data = json.load(f)
          critical = [r for r in data.get("results", []) if r["severity"] in ["HIGH", "CRITICAL"]]
          if critical:
              print(f"❌ Found {len(critical)} CRITICAL/HIGH issues:")
              for r in critical:
                  print(f"  - {r['issue_text']} ({r['test_id']})")
              exit(1)
          else:
              print("✅ No CRITICAL/HIGH findings")
          EOF

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
          generateSarif: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep.sarif
        if: always()

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Safety check (dependency CVEs)
        run: pip install safety && safety check --json
        continue-on-error: true

  zap-scan:
    name: OWASP ZAP Dynamic Scan
    runs-on: ubuntu-latest
    needs: [bandit, semgrep]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start test server
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 5

      - name: Run OWASP ZAP
        uses: zaproxy/action-api-scan@v0
        with:
          target: "http://localhost:8000/openapi.json"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
        continue-on-error: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: zap-report
          path: report_md.md

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt mypy types-redis

      - name: Run mypy strict
        run: mypy app --strict

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [bandit, semgrep, dependency-check, type-check]
    if: always()
    steps:
      - name: Report Security Status
        run: |
          if [ "${{ needs.bandit.result }}" == "failure" ] || [ "${{ needs.semgrep.result }}" == "failure" ]; then
            echo "❌ Security checks failed"
            exit 1
          else
            echo "✅ All security checks passed"
          fi

# PRR Gate: Security tests must pass before merging to main/master
