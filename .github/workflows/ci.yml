name: CI

on:
  push:
    branches: [master, main, "feature/**", "fix/**"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff + mypy + Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff — check and format
        run: |
          ruff check app tests --output-format=github
          ruff format app tests --check

      - name: mypy — strict type checking
        run: mypy app

      - name: Bandit — SAST security scan
        run: bandit -r app -ll -ii --format json -o bandit-report.json || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ─── 2. Test ───────────────────────────────────────────────────────────────
  test:
    name: Test (pytest + Testcontainers)
    runs-on: ubuntu-latest
    # Testcontainers spins up its own Docker containers — no services: block needed
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          ENVIRONMENT: testing
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -x \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          thresholds: "70 85"
        continue-on-error: true

  # ─── 3. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ras-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/ras-backend.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ras-backend-image
          path: /tmp/ras-backend.tar
          retention-days: 1

  # ─── 4. Scan ───────────────────────────────────────────────────────────────
  scan:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ras-backend-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/ras-backend.tar

      - name: Trivy — image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ras-backend:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"     # CRITICAL CVEs fail the pipeline (per @darius policy)
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ─── 5. Frontend Lint + Typecheck ──────────────────────────────────────────
  frontend-lint:
    name: Frontend lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint + TypeScript check
        run: pnpm lint
